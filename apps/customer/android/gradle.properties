org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# Kotlin incremental compilation is disabled because it cannot release its
# memory-mapped cache files on Windows under the pinned Gradle 9.1.0 + Kotlin
# 2.3.20 (`:shared_preferences_android:compileDebugKotlin` fails with "Could not
# close incremental caches ... class-fq-name-to-source.tab"). Surfaced when the
# Step 5 plugins landed; `flutter clean` and
# `kotlin.compiler.execution.strategy=in-process` do not help.
#
# Cost: Kotlin modules fully recompile each build. Not a version change (Rule 3
# is unaffected) — revisit when Gradle/Kotlin are next upgraded, and drop this
# line if the build survives without it.
kotlin.incremental=false
