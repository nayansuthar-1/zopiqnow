name: zopiqnow
description: "Zopiqnow premium food delivery and quick commerce app"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

# Part of the zopiqnow pub workspace: shares the single root lockfile (Rule 3).
resolution: workspace

environment:
  sdk: ^3.12.2

# NOTE (Rule 3): after the first successful resolve these constraints are pinned
# to exact versions; the committed root pubspec.lock is authoritative. Never run
# `flutter pub upgrade` outside an approved upgrade task.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.9

  # Shared design system — Swiggy-grade tokens & theme (Rule 2).
  zopiq_ui:
    path: ../../packages/zopiq_ui

  # State management + DI (SAD 7.2 / 7.3).
  flutter_riverpod: 2.6.1

  # Declarative navigation (SAD 7.10).
  go_router: 14.8.1

  # --- Storage layer (approved Step 5, Rule 3 change request) -----------------
  # Auth tokens only. Android-side this is Keystore-backed EncryptedSharedPrefs
  # (SAD 7.6, 9.2: "token stored in secure storage"). Declares minSdk 23 — under
  # our floor of 24, so Rule 1 is unaffected.
  flutter_secure_storage: 10.3.1

  # Non-secret local state: selected address id, recent searches. Never tokens.
  shared_preferences: 2.5.5

  # --- Location (approved Step 5, Rule 3 change request) ----------------------
  # Coordinates only. Inherits flutter.minSdkVersion (24).
  geolocator: 14.0.3

  # Reverse-geocode via Android's *native* Geocoder — no Maps API key, no
  # billing. Google Places autocomplete (SAD 14) arrives with the backend.
  geocoding: 5.0.0

  # --- Payments (approved Step 6, Rule 3 change request, 2026-07-10) ----------
  # Razorpay checkout for UPI/cards. Declares minSdk 19 — under our floor of 24.
  # The checkout wiring itself lands with the backend (Step 7): opening the
  # gateway needs a key id and a server-created payment order.
  razorpay_flutter: 1.4.5

  # --- Backend (approved Step 7, Rule 3 change request, 2026-07-11) -----------
  # Supabase = Postgres + PostgREST + realtime. Chosen over Firestore because
  # the money rules (coupon minimums, discount caps, order state) belong in SQL
  # constraints and transactions, not in application code. Declares minSdk 21 —
  # under our floor of 24, so Rule 1 is unaffected.
  supabase_flutter: 2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Dish-category artwork for the Home rail. OpenMoji (CC BY-SA 4.0) — see
  # ATTRIBUTIONS.md. Stand-ins until commissioned illustrations are ready.
  assets:
    - assets/categories/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
