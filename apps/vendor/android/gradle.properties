org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# Same reason as the customer app: Kotlin incremental compilation cannot release
# its memory-mapped cache files on Windows under the pinned Gradle 9.1.0 +
# Kotlin 2.3.20, and the build fails outright without this. Costs full Kotlin
# recompiles. Not a version change (Rule 3 unaffected) — drop it if a future
# Gradle/Kotlin upgrade survives without it.
kotlin.incremental=false
