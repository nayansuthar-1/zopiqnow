name: zopiq_vendor
description: "Zopiqnow for restaurants — the kitchen's side of an order."
publish_to: 'none'

version: 1.0.0+1

# Part of the zopiqnow pub workspace: shares the single root lockfile (Rule 3).
resolution: workspace

environment:
  sdk: ^3.12.2

# Almost every dependency here is one the customer app already pins, at the version
# the root lockfile already froze. The one exception is `image_picker`, an approved
# Rule 3 change request (2026-07-17): the vendor uploads dish and restaurant photos
# to Cloudinary, and picking an image off the device is the one thing Supabase does
# not do. Pinned exactly; the upload itself is an `http` multipart POST, no more deps.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.9

  # The same design system, so the two apps cannot drift into two brands.
  zopiq_ui:
    path: ../../packages/zopiq_ui

  flutter_riverpod: 2.6.1
  go_router: 14.8.1

  # The vendor's session, in the Keystore. Same reasoning as the customer app: a
  # refresh token in SharedPreferences is a refresh token in a plaintext file.
  flutter_secure_storage: 10.3.1

  supabase_flutter: 2.8.0

  # Photo upload (approved 2026-07-17). Picks a dish/restaurant photo off the
  # device; the bytes go straight to Cloudinary, only the URL comes back.
  image_picker: 1.1.2
  http: 1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 6.0.0

flutter:
  uses-material-design: true
