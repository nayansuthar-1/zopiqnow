# Workspace root for the zopiqnow monorepo (Dart pub workspaces).
# `flutter pub get` here resolves every member into a SINGLE shared lockfile
# (pubspec.lock at this root) — the authoritative frozen dependency set (Rule 3).
name: zopiqnow_workspace
description: "Zopiqnow monorepo workspace root (apps + shared packages)."
publish_to: "none"

environment:
  sdk: ^3.12.2

# Members of the workspace. Each member sets `resolution: workspace`.
workspace:
  - apps/customer
  - apps/vendor
  - packages/zopiq_ui

# Tooling only — Melos runs scripts (analyze/test/format) across all members.
dev_dependencies:
  melos: 6.3.3
