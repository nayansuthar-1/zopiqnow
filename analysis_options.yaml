# Shared analyzer config for the entire zopiqnow monorepo.
# Members include this AFTER flutter_lints, e.g.:
#   include:
#     - package:flutter_lints/flutter.yaml
#     - ../../analysis_options.yaml
# (flutter_lints lives in each member's dev_dependencies, not the workspace root.)

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat these as build-blocking to keep the codebase honest.
    invalid_annotation_target: ignore
    missing_required_param: error
    missing_return: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gen.dart"

linter:
  rules:
    # --- Rule 2 guardrails (design-token discipline is enforced in review) ---
    prefer_single_quotes: true
    require_trailing_commas: true
    # --- Correctness / safety ---
    always_use_package_imports: true
    avoid_dynamic_calls: true
    cancel_subscriptions: true
    close_sinks: true
    unawaited_futures: true
    # --- Readability / consistency ---
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_locals: true
    sort_child_properties_last: true
    use_key_in_widget_constructors: true
